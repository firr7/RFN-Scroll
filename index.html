[{"cat": "rev", "tag": "Società · Cap. 8", "emoji": "⚔️", "title": "Il 98% che valeva zero", "title_em": "98%", "body": "La Francia del 1789 era divisa in tre ordini. Il <b>Terzo Stato</b> era il 98% della popolazione — contadini, artigiani, borghesi — ma aveva una voce sola contro due. Clero (0,5%) e Nobiltà (1,5%) controllavano tutto e non pagavano quasi tasse.", "fact": "L'abate Sieyès scrisse: \"Cos'è il Terzo stato? Tutto. Cosa è stato finora? Nulla.\" Fu il manifesto della Rivoluzione.", "bg": "135deg, #1a0a00, #3d1a0a, #1a0505"}, {"cat": "rev", "tag": "Economia · Cap. 8", "emoji": "💸", "title": "La Francia era in bancarotta", "title_em": "bancarotta", "body": "Le casse dello Stato erano vuote: le guerre del Settecento avevano prosciugato il tesoro reale. Gli interessi sul debito assorbivano oltre metà delle entrate. Le riforme fiscali di <b>Turgot e Necker</b> furono bloccate dai privilegiati.", "fact": "Nel 1788-89 un raccolto disastroso fece salire il prezzo del pane all'80-90% del salario di un operaio. La fame trasformò la crisi politica in rivoluzione.", "bg": "150deg, #0d0800, #281500, #0d0800"}, {"cat": "rev", "tag": "Politica · Cap. 8", "emoji": "🗳️", "title": "Voto per ordine o per testa?", "title_em": "per testa", "body": "Agli Stati Generali (5 maggio 1789) il Terzo Stato esige il voto <b>per testa</b> — ogni deputato un voto, con 578 seggi avrebbe la maggioranza. Il re vuole il voto per ordine dove il Terzo Stato perde sempre 2 a 1. Questa disputa innesca la crisi rivoluzionaria.", "fact": "Il 17 giugno 1789 il Terzo Stato si autoproclamò Assemblea Nazionale: primo atto rivoluzionario formale, ancora prima della Bastiglia.", "bg": "140deg, #050a14, #0a0525, #050a14"}, {"cat": "rev", "tag": "20 Giugno 1789 · Cap. 8", "emoji": "✊", "title": "Il Giuramento della Pallacorda", "title_em": "Giuramento", "body": "Il 20 giugno 1789 i deputati del Terzo Stato trovano l'aula sbarrata. Si spostano in una sala da gioco vicina e giurano di <b>non sciogliersi finché la Francia non avrà una Costituzione</b>. È il primo atto rivoluzionario formale e collettivo.", "fact": "Il pittore Jacques-Louis David immortalò il giuramento in un celebre quadro, diventato uno dei simboli visivi della Rivoluzione francese.", "bg": "155deg, #0a0505, #200a08, #0a0505"}, {"cat": "rev", "tag": "14 Luglio 1789 · Cap. 8", "emoji": "🏰", "title": "La Bastiglia cade in sei ore", "title_em": "Bastiglia", "body": "Alle 13:30 del 14 luglio 1789 circa 800 parigini armati assaltano la fortezza-prigione simbolo del dispotismo reale. In sei ore la conquistano. I difensori erano appena <b>82 invalidi e 32 guardie svizzere</b>. I prigionieri liberati: sette.", "fact": "Simbolicamente enorme, militarmente minima. La vera rivoluzione era già avvenuta nell'Assemblea tre settimane prima. Il 14 luglio è ancora oggi la Festa nazionale francese.", "bg": "160deg, #0d0505, #2a0f0a, #0a0a14"}, {"cat": "rev", "tag": "26 Agosto 1789 · Cap. 8", "emoji": "📜", "title": "La Dichiarazione dei diritti", "title_em": "Dichiarazione", "body": "L'Assemblea approva la Dichiarazione dei diritti dell'uomo e del cittadino. Art. 1: <b>Gli uomini nascono e rimangono liberi e uguali nei diritti.</b> Non per nascita, non per volontà di Dio — ma per natura. Art. 3: la sovranità appartiene alla Nazione.", "fact": "È ancora valida oggi: fa parte integrante della Costituzione francese vigente ed è la base di tutta la democrazia occidentale moderna.", "bg": "150deg, #0a0a0d, #1a1505, #0a0d05"}, {"cat": "rev", "tag": "Antico Regime · Cap. 8", "emoji": "⚖️", "title": "Antico Regime contro Dichiarazione", "title_em": "contro", "body": "L'Antico Regime era fondato su diritti diversi per nascita, sovranità del re per grazia divina, arresti arbitrari con le lettres de cachet. La Dichiarazione rovescia tutto: <b>uguaglianza, sovranità nazionale, garanzie giuridiche, libertà di stampa, merito</b>.", "fact": "Presunzione di innocenza, libertà di opinione, uguaglianza davanti alla legge: tutti principi nati il 26 agosto 1789 che oggi diamo per scontati.", "bg": "140deg, #0a0a05, #1a1a08, #0a0a05"}, {"cat": "rev", "tag": "Diritti · Cap. 8", "emoji": "👩", "title": "Diritti degli uomini, non delle donne", "title_em": "non delle donne", "body": "<b>Olympe de Gouges</b> scrisse nel 1791 la Dichiarazione dei diritti della donna e della cittadina — denunciando l'ipocrisia di una Rivoluzione che escludeva metà della popolazione. Rivendicava voto, istruzione e uguaglianza giuridica.", "fact": "Robespierre la fece ghigliottinare nel novembre 1793, accusandola di aver dimenticato le virtù del suo sesso. La sua dichiarazione fu ignorata per 150 anni.", "bg": "160deg, #0a0508, #1a0814, #0a0508"}, {"cat": "rev", "tag": "Giugno 1791 · Cap. 8", "emoji": "🏃", "title": "La fuga fallita a Varennes", "title_em": "Varennes", "body": "Il 20-21 giugno 1791 Luigi XVI tenta di fuggire in Austria per chiedere aiuto militare straniero. Viene <b>riconosciuto e fermato a Varennes</b>, a pochi km dal confine. Riportato a Parigi umiliato. Colpo irreparabile alla sua credibilità.", "fact": "Fu riconosciuto da un funzionario locale che aveva visto il suo ritratto sulle monete. Dopo Varennes, molti iniziarono a pensare alla Repubblica come unica soluzione.", "bg": "145deg, #080508, #180f18, #080508"}, {"cat": "rev", "tag": "Suffragio · Cap. 8", "emoji": "🗳️", "title": "Libertà sì, voto no", "title_em": "voto no", "body": "La Rivoluzione proclamò l'uguaglianza — ma il voto rimase riservato ai <b>cittadini attivi</b>: maschi adulti che pagavano imposte. Le donne e i poveri erano cittadini passivi: diritti civili ma niente voto. Nella Costituzione del 1791: circa 4,3 milioni di votanti su 28 milioni di abitanti.", "fact": "Il suffragio universale maschile in Francia arrivò nel 1848 — 59 anni dopo la Rivoluzione. Quello femminile nel 1944, dopo la Seconda Guerra Mondiale.", "bg": "135deg, #050a0d, #0a1a1a, #050a0d"}, {"cat": "rev", "tag": "21 Settembre 1792 · Cap. 8", "emoji": "🗡️", "title": "Nasce la Repubblica. Muore il re.", "title_em": "Repubblica", "body": "Il 10 agosto 1792 il palazzo delle Tuileries viene assaltato e Luigi XVI arrestato. Il 21 settembre 1792 nasce la <b>Prima Repubblica francese</b>. Il 21 gennaio 1793, Luigi XVI sale al patibolo in Place de la Révolution. Fine della monarchia.", "fact": "Dalla disposizione dei seggi alla Convenzione nascono i termini destra e sinistra: i giacobini radicali sedevano in alto a sinistra, i girondini moderati a destra.", "bg": "160deg, #0d0000, #1f0505, #0a0808"}, {"cat": "rev", "tag": "1793-1794 · Cap. 8", "emoji": "☠️", "title": "Il Terrore: 1.400 ghigliottinati in sei settimane", "title_em": "Terrore", "body": "Con la legge del 22 pratile (giugno 1794) Robespierre elimina ogni garanzia processuale: condanne <b>senza prove, senza avvocati, senza appello</b>. Solo due verdetti: assoluzione o morte. In sei settimane 1.400 esecuzioni. Nel Terrore in totale: circa 17.000 morti.", "fact": "La ghigliottina fu adottata perché uguale per tutti: prima i nobili venivano decapitati con la spada, i comuni impiccati. La Rivoluzione uguagliò anche la morte.", "bg": "160deg, #0d0000, #1f0505, #0a0808"}, {"cat": "rev", "tag": "9 Termidoro 1794 · Cap. 8", "emoji": "🌡️", "title": "Robespierre ghigliottinato senza processo", "title_em": "senza processo", "body": "Il 27 luglio 1794 (9 Termidoro) Robespierre viene arrestato in piena Convenzione. Il giorno dopo è ghigliottinato <b>senza processo</b> — esattamente come aveva fatto con i suoi nemici. Inizia la Reazione Termidoriana: ritorno dei moderati, persecuzione dei giacobini.", "fact": "Robespierre fu l'unico protagonista della Rivoluzione a morire per mano della Rivoluzione stessa. Il suo arresto fu deciso da colleghi che temevano di essere la prossima vittima.", "bg": "145deg, #0a0505, #1a0808, #0a0505"}, {"cat": "rev", "tag": "1795-1799 · Cap. 8", "emoji": "🏛️", "title": "Il Direttorio: debole per costruzione", "title_em": "debole", "body": "La Costituzione dell'Anno III (1795) crea il Direttorio: <b>5 direttori + parlamento bicamerale</b>. Pensata per evitare la dittatura — nessuno può sciogliere l'altro. Risultato: stallo permanente. Annullò le elezioni del 1797 (vincevano i monarchici) e del 1798 (vincevano i giacobini).", "fact": "Un governo che annulla le proprie elezioni perde ogni legittimità. Quando Napoleone lo rovesciò nel 1799, praticamente nessuno lo difese.", "bg": "140deg, #050814, #0a1028, #050814"}, {"cat": "nap", "tag": "1796 · Cap. 9", "emoji": "⚔️", "title": "A 26 anni conquista l'Italia", "title_em": "conquista", "body": "Nel 1796 Napoleone Bonaparte — <b>26 anni, semisconosciuto</b> — riceve il comando dell'Armata d'Italia. Esercito stremato, mal pagato. In 12 mesi batte Austria e Piemonte con manovre rapide, fonda 5 repubbliche e negozia trattati di pace da solo senza aspettare Parigi.", "fact": "Il Direttorio gli affidò il fronte italiano perché era considerato secondario. Nessun generale di rango lo voleva. Napoleone ne fece il trampolino verso il potere.", "bg": "150deg, #040814, #080e28, #040814"}, {"cat": "nap", "tag": "Tattica · Cap. 9", "emoji": "🗺️", "title": "La guerra di movimento che cambiò tutto", "title_em": "movimento", "body": "Napoleone abbandonò le lunghe battaglie di posizione del Settecento. La sua tattica: <b>marce forzate per sorprendere il nemico, concentrazione rapida sul punto più debole, attacchi sul fianco</b>. Montenotte, Millesimo, Lodi, Arcole, Rivoli — ogni vittoria applicava lo stesso schema.", "fact": "I Bollettini dell'Armata d'Italia — comunicati di guerra scritti da Napoleone stesso in tono eroico — venivano letti in tutta Europa. Nasce il mito napoleonico.", "bg": "155deg, #04080e, #080f1c, #04080e"}, {"cat": "nap", "tag": "Repubbliche · Cap. 9", "emoji": "🏛️", "title": "Le Repubbliche Sorelle italiane", "title_em": "Sorelle", "body": "Nei territori conquistati Napoleone fonda Repubbliche modellate su quella francese: <b>Cispadana</b> (1796, prima a usare il tricolore), <b>Cisalpina</b> (Milano), <b>Ligure</b> (Genova), <b>Romana</b> (1798), <b>Napoletana</b> (1799). Adottano il Codice civile e aboliscono il feudalesimo.", "fact": "Queste repubbliche erano sorelle in senso ideologico ma dipendenti in senso pratico — Napoleone imponeva contribuzioni di guerra pesanti e prelevava opere d'arte.", "bg": "140deg, #040a08, #0a1e10, #040a08"}, {"cat": "nap", "tag": "Ottobre 1797 · Cap. 9", "emoji": "🤝", "title": "Campoformio: Venezia tradita", "title_em": "tradita", "body": "Con il Trattato di Campoformio Napoleone cede la <b>Repubblica di Venezia all'Austria</b> — uno Stato indipendente da oltre 1.000 anni — in cambio del riconoscimento della Cisalpina. Lo decide da solo, senza consultare Parigi né i veneziani.", "fact": "Ugo Foscolo scrisse Le ultime lettere di Jacopo Ortis come reazione: il protagonista si suicida dopo aver perso la patria. Campoformio rivelò che Napoleone usava gli ideali come strumento.", "bg": "160deg, #040a14, #0a1428, #040a14"}, {"cat": "nap", "tag": "Identità · Cap. 9", "emoji": "🌍", "title": "Napoleone inventò gli italiani", "title_em": "italiani", "body": "Prima di Napoleone non esistevano gli italiani — solo veneziani, milanesi, napoletani, romani. Con le repubbliche sorelle e il Regno d'Italia, per la prima volta la penisola condivise <b>le stesse leggi, gli stessi funzionari, lo stesso sistema fiscale</b>. Nacque l'idea di nazione italiana.", "fact": "Il tricolore verde-bianco-rosso nasce nel 1797 dalla Repubblica Cispadana. Diventerà la bandiera del Risorgimento — direttamente ispirato all'esperienza napoleonica.", "bg": "145deg, #040a06, #0a1a0c, #040a06"}, {"cat": "nap", "tag": "18 Brumaio 1799 · Cap. 9", "emoji": "⚡", "title": "Il colpo di stato che quasi fallì", "title_em": "quasi fallì", "body": "Il 9 novembre 1799 Napoleone entra nell'aula del Consiglio dei Cinquecento per scioglierlo. I deputati lo circondano urlando <b>Fuorilegge!</b> Napoleone quasi sviene. Lo salvano i granatieri della guardia e il fratello Luciano che convince i soldati a disperdere i deputati.", "fact": "Fu il fratello Luciano, presidente del Consiglio, a salvare la situazione. Senza di lui Napoleone sarebbe stato probabilmente arrestato. Il Consolato nasce da un colpo di fortuna.", "bg": "160deg, #08050a, #18102a, #08050a"}, {"cat": "nap", "tag": "1799-1804 · Cap. 9", "emoji": "👑", "title": "Da console a imperatore", "title_em": "imperatore", "body": "In quattro anni Napoleone scala tutto il potere: <b>1799</b> primo console, <b>1802</b> console a vita per plebiscito, <b>2 dicembre 1804</b> si incorona imperatore a Notre-Dame davanti a Papa Pio VII — ma prende lui stesso la corona dalle mani del papa e se la mette in testa.", "fact": "Il gesto di autoincornarsi fu deliberato: Napoleone voleva sottolineare che il suo potere non veniva da Dio né dalla Chiesa, ma da sé stesso e dalla Nazione.", "bg": "150deg, #0a0800, #201500, #0a0800"}, {"cat": "nap", "tag": "1804 · Cap. 9", "emoji": "📖", "title": "Il Codice Napoleone che usiamo ancora", "title_em": "ancora", "body": "Il Codice civile del 1804: prima raccolta unitaria di leggi — <b>uguaglianza davanti alla legge, libertà di coscienza, tutela della proprietà privata, abolizione del diritto feudale</b>. Fine delle oltre 250.000 norme locali diverse della Francia pre-rivoluzionaria.", "fact": "Napoleone disse: La mia vera gloria non sono le quaranta battaglie. Waterloo le cancellerà. Ciò che nulla cancellerà è il mio Codice civile. È ancora alla base del diritto di Francia, Italia, Spagna e molti altri.", "bg": "140deg, #040a10, #0a1a20, #040a10"}, {"cat": "nap", "tag": "Stato · Cap. 9", "emoji": "🏛️", "title": "Il prefetto: lo Stato ovunque", "title_em": "ovunque", "body": "Napoleone crea la figura del <b>prefetto</b>: funzionario statale nominato dal governo centrale (non eletto), posto a capo di un dipartimento. Rappresenta il governo, fa rispettare le leggi, raccoglie le tasse. Gerarchia: prefetti, sottoprefetti, sindaci.", "fact": "Il sistema dei prefetti esiste ancora oggi in Francia e in Italia. Napoleone non inventò solo il Codice civile — inventò lo Stato moderno centralizzato.", "bg": "155deg, #04080e, #080e20, #04080e"}, {"cat": "nap", "tag": "2 Dic 1805 · Cap. 9", "emoji": "🏆", "title": "Austerlitz: la battaglia dei tre imperatori", "title_em": "Austerlitz", "body": "Il 2 dicembre 1805, anniversario della sua incoronazione, Napoleone sconfigge gli eserciti combinati di Russia e Austria. <b>Tre imperatori sul campo</b>: Napoleone, lo zar Alessandro I, l'imperatore Francesco II. Considerata la sua vittoria più brillante.", "fact": "Napoleone attirò deliberatamente gli austro-russi su un terreno che conosceva nei minimi dettagli. La nebbia mattutina nascose le sue truppe fino al momento decisivo.", "bg": "150deg, #040810, #08102a, #040810"}, {"cat": "nap", "tag": "21 Ott 1805 · Cap. 9", "emoji": "🚢", "title": "Trafalgar: il mare resta inglese", "title_em": "Trafalgar", "body": "Il 21 ottobre 1805 — 7 settimane prima di Austerlitz — la flotta napoleonica viene distrutta dall'ammiraglio Nelson al largo di Capo Trafalgar. Fine dei piani di invasione dell'Inghilterra. <b>Napoleone domina il continente, ma non può attraversare la Manica</b>.", "fact": "Nelson muore nella battaglia. La sua nave, la Victory, è ancora in servizio simbolico nella marina britannica — la nave da guerra più antica del mondo ancora a galla.", "bg": "160deg, #020810, #04101e, #020810"}, {"cat": "nap", "tag": "Nov 1806 · Cap. 9", "emoji": "🚫", "title": "Il blocco continentale: un boomerang", "title_em": "boomerang", "body": "Novembre 1806: Napoleone proibisce alle navi inglesi di attraccare in qualsiasi porto europeo. Obiettivo: strangolare l'economia britannica. Risultato: il contrabbando dilaga, i prezzi salgono, le economie europee soffrono. <b>Danneggia più gli alleati che gli inglesi</b>.", "fact": "Quando lo zar Alessandro I ruppe il blocco nel 1810, Napoleone lo usò come pretesto per invadere la Russia — la campagna che distrusse la Grande Armata.", "bg": "145deg, #040a10, #081428, #040a10"}, {"cat": "nap", "tag": "1808 · Cap. 9", "emoji": "🇪🇸", "title": "La Spagna: la prima guerriglia moderna", "title_em": "guerriglia", "body": "Dal 1808 la Spagna resiste all'occupazione con una <b>guerra di guerriglia</b> — la parola nasce qui. Piccoli gruppi armati colpiscono e scompaiono, sostenuti dall'Inghilterra. Tenne impegnato l'esercito napoleonico per anni, contribuendo al suo logoramento.", "fact": "La Costituzione di Cadice (1812), approvata durante la resistenza spagnola, diventa il modello del liberalismo europeo del XIX secolo.", "bg": "140deg, #0a0400, #1e0a00, #0a0400"}, {"cat": "nap", "tag": "1812 · Cap. 9", "emoji": "❄️", "title": "600.000 uomini entrano. 100.000 tornano.", "title_em": "100.000 tornano", "body": "La campagna di Russia è il più grande disastro militare della storia moderna. Napoleone invade con la <b>Grande Armata: 600.000 soldati</b>. I russi usano la terra bruciata. Mosca viene incendiata dagli stessi russi. La Beresina (novembre 1812): sopravvivono in circa 100.000.", "fact": "Mosca fu incendiata dagli stessi russi per privare Napoleone di un quartier generale. Quando l'esercito francese arrivò trovò solo macerie fumanti e nessun accordo di resa.", "bg": "160deg, #040810, #080f1e, #040810"}, {"cat": "nap", "tag": "1813-1815 · Cap. 9", "emoji": "⚡", "title": "Lipsia, Elba, Waterloo: la fine", "title_em": "Waterloo", "body": "<b>Ottobre 1813 — Lipsia</b>: la sesta coalizione sconfigge Napoleone. <b>Aprile 1814</b>: abdica, esiliato all'Elba. <b>Marzo 1815</b>: i Cento Giorni — torna a Parigi. <b>18 giugno 1815 — Waterloo</b>: Wellington e Blücher lo sconfiggono definitivamente. Esiliato a Sant'Elena fino alla morte nel 1821.", "fact": "Napoleone mori a Sant'Elena il 5 maggio 1821 all'età di 51 anni. Ancora oggi si discute se mori per cancro allo stomaco o per avvelenamento lento da arsenico.", "bg": "155deg, #080808, #141418, #080808"}]
</script>

[{"cat": "int", "tag": "Domanda 1 · Interrogazione", "emoji": "🎯", "title": "Cause della Rivoluzione", "title_em": "Cause", "body": "<b>Sociali:</b> tre ordini squilibrati, Terzo Stato = 98% senza potere. <b>Economiche:</b> bancarotta dello Stato, tasse solo sui poveri, carestia 1788-89. <b>Politiche:</b> Luigi XVI debole, Illuminismo, esempio americano, crisi agli Stati Generali.", "fact": "Sieyès: Cos'è il Terzo Stato? Tutto. Cosa è stato finora? Nulla. — Il manifesto che riassume tutto.", "bg": "135deg, #1a0500, #3a0f05, #0f0505"}, {"cat": "int", "tag": "Domanda 2 · Interrogazione", "emoji": "🎯", "title": "Dichiarazione dei diritti del 1789", "title_em": "diritti", "body": "<b>Cosa prevedeva:</b> Art.1 uguaglianza, Art.3 sovranità nazionale, Art.6 legge uguale per tutti, Art.7-9 garanzie giuridiche, Art.10-11 libertà di stampa e opinione. <b>Rovesciamento Antico Regime:</b> nascita per merito, non per sangue. Sovranità alla Nazione, non al re.", "fact": "È ancora parte della Costituzione francese oggi. Trasforma sudditi in cittadini — la differenza fondamentale rispetto all'Antico Regime.", "bg": "140deg, #0a0a00, #1e1a00, #0a0a00"}, {"cat": "int", "tag": "Domanda 3 · Interrogazione", "emoji": "🎯", "title": "Il Direttorio: caratteristiche e caduta", "title_em": "Direttorio", "body": "<b>Struttura:</b> 5 direttori + parlamento bicamerale (Cinquecento + Anziani), suffragio censitario. <b>Debolezze:</b> stallo strutturale, annullò le elezioni del 1797 e 1798, corruzione, assegnati svalutati. <b>Caduta:</b> Sieyès cerca un uomo forte, 18 Brumaio nov 1799.", "fact": "Un governo che annulla le proprie elezioni perde ogni legittimità — quando Napoleone lo rovesciò, nessuno lo difese.", "bg": "145deg, #050814, #0a1030, #050814"}, {"cat": "int", "tag": "Domanda 4 · Interrogazione", "emoji": "🎯", "title": "Le tre Costituzioni a confronto", "title_em": "Costituzioni", "body": "<b>1791:</b> monarchia costituzionale, suffragio censitario, applicata. <b>1793:</b> repubblica, s <style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Syne',sans-serif; }

#reel-container { width:100%; height:100%; height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
#reel-container::-webkit-scrollbar { display:none; }

.slide { width:100%; height:100%; height:100dvh; scroll-snap-align:start; scroll-snap-stop:always; position:relative; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; }

.slide-bg { position:absolute; inset:0; z-index:0; transition:transform .8s cubic-bezier(.2,.8,.2,1); }
.slide.active .slide-bg { transform:scale(1); }
.slide:not(.active) .slide-bg { transform:scale(1.06); }
.slide-overlay { position:absolute; inset:0; z-index:1; background:linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.45) 40%, rgba(0,0,0,.15) 75%, rgba(0,0,0,.05) 100%); }

.slide-content { position:relative; z-index:2; padding:1.8rem 1.6rem; width:100%; max-width:520px; transition:opacity .4s, transform .4s; }
.slide:not(.active) .slide-content { opacity:0; transform:translateY(16px); }
.slide.active .slide-content { opacity:1; transform:translateY(0); }

.slide-tag { display:inline-block; font-size:.62rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; padding:.28rem .7rem; border-radius:2px; margin-bottom:.75rem; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.7); }
.cat-rev .slide-tag { background:rgba(232,97,74,.15); border-color:rgba(232,97,74,.3); color:#e8917e; }
.cat-nap .slide-tag { background:rgba(74,143,232,.15); border-color:rgba(74,143,232,.3); color:#7eb5e8; }
.cat-int .slide-tag { background:rgba(180,74,232,.15); border-color:rgba(180,74,232,.3); color:#c87ee8; }

.slide-num { font-family:'Syne Mono',monospace; font-size:.68rem; color:rgba(255,255,255,.28); margin-bottom:.4rem; letter-spacing:.1em; }
.slide-title { font-family:'Instrument Serif',serif; font-size:clamp(1.65rem,6vw,2.5rem); font-weight:400; line-height:1.15; color:#fff; margin-bottom:.85rem; }
.slide-title em { font-style:italic; color:#c9a84c; }
.cat-int .slide-title em { color:#c87ee8; }
.slide-body { font-size:clamp(.85rem,3.5vw,.97rem); line-height:1.75; color:rgba(255,255,255,.82); margin-bottom:.9rem; }
.slide-body b { color:#fff; font-weight:600; }
.slide-fact { padding:.7rem .9rem; border-left:3px solid #c9a84c; background:rgba(255,255,255,.06); border-radius:0 4px 4px 0; font-size:clamp(.78rem,3vw,.88rem); color:rgba(255,255,255,.7); line-height:1.65; }
.cat-int .slide-fact { border-left-color:#c87ee8; }

#progress-bar { position:fixed; top:0; left:0; height:2px; background:white; z-index:100; transition:width .3s ease; mix-blend-mode:difference; }

#top-ui { position:fixed; top:0; left:0; right:0; z-index:50; padding:.8rem 1.3rem .5rem; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to bottom, rgba(0,0,0,.65), transparent); pointer-events:none; }
.app-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:white; }
.app-logo span { opacity:.38; }
.slide-counter { font-family:'Syne Mono',monospace; font-size:.68rem; color:rgba(255,255,255,.4); }

#side-actions { position:fixed; right:.9rem; bottom:5rem; z-index:50; display:flex; flex-direction:column; align-items:center; gap:1.3rem; }
.action-btn { display:flex; flex-direction:column; align-items:center; gap:.25rem; cursor:pointer; }
.action-icon { width:42px; height:42px; background:rgba(255,255,255,.12); backdrop-filter:blur(10px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; border:1px solid rgba(255,255,255,.14); transition:transform .15s; }
.action-btn.liked .action-icon { background:rgba(255,80,80,.3); }
.action-label { font-size:.58rem; color:rgba(255,255,255,.5); font-weight:600; letter-spacing:.06em; }

#bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; padding:.5rem 0 calc(.5rem + env(safe-area-inset-bottom, 0px)); display:flex; justify-content:space-around; background:linear-gradient(to top, rgba(0,0,0,.92), transparent); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:.18rem; cursor:pointer; padding:.2rem .3rem; opacity:.4; transition:opacity .2s; flex:1; }
.nav-item.active { opacity:1; }
.nav-icon { font-size:1.05rem; }
.nav-label { font-size:.5rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:white; white-space:nowrap; }

#scroll-hint { position:fixed; bottom:4.5rem; left:50%; transform:translateX(-50%); z-index:50; display:flex; flex-direction:column; align-items:center; gap:.3rem; transition:opacity .6s; pointer-events:none; }
#scroll-hint.hidden { opacity:0; }
.hint-arrow { width:26px; height:26px; border:2px solid rgba(255,255,255,.4); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.8rem; animation:bounce 1.5s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
.hint-txt { font-size:.58rem; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; }

/* SAVED SCREEN */
#saved-screen { position:fixed; inset:0; z-index:200; background:#0a0a10; display:none; flex-direction:column; }
#saved-screen.open { display:flex; }
#saved-header { padding:3rem 1.4rem 1rem; background:linear-gradient(to bottom,#0f0f1a,#0a0a10); border-bottom:1px solid rgba(255,255,255,.08); flex-shrink:0; }
#saved-header h2 { font-family:'Instrument Serif',serif; font-size:1.6rem; color:#fff; font-weight:400; margin-bottom:.25rem; }
#saved-count { font-size:.75rem; color:rgba(255,255,255,.35); }
#saved-close { font-size:.8rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.45); cursor:pointer; margin-bottom:.6rem; display:inline-flex; align-items:center; gap:.3rem; padding:.2rem 0; }
#saved-close:active { color:#fff; }
#saved-list { flex:1; overflow-y:auto; padding:1rem 1.2rem 5rem; display:flex; flex-direction:column; gap:.75rem; }
.saved-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:1rem 1.1rem 1rem 1rem; cursor:pointer; position:relative; transition:opacity .2s, transform .2s; }
.saved-card-tag { font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.35); margin-bottom:.35rem; }
.saved-card-title { font-family:'Instrument Serif',serif; font-size:1.05rem; color:#fff; line-height:1.25; padding-right:1.5rem; }
.saved-remove { position:absolute; top:.8rem; right:.9rem; font-size:1.1rem; color:rgba(255,255,255,.2); cursor:pointer; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
#saved-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.8rem; color:rgba(255,255,255,.25); font-size:.85rem; text-align:center; padding:4rem 2rem; }
#saved-empty .ei { font-size:2.5rem; }
</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="top-ui">
  <div class="app-logo">Know<span>Scroll</span></div>
  <div class="slide-counter" id="slideCounter">1 / 29</div>
</div>

<div id="scroll-hint">
  <div class="hint-arrow">&#8595;</div>
  <div class="hint-txt">Scorri per imparare</div>
</div>

<div id="side-actions">
  <div class="action-btn" id="btnLike" onclick="toggleLike()">
    <div class="action-icon" id="likeIcon">&#9825;</div>
    <div class="action-label">Salva</div>
  </div>
  <div class="action-btn" onclick="shuffleRandom()">
    <div class="action-icon">&#9684;</div>
    <div class="action-label">Random</div>
  </div>
</div>

<div id="bottom-nav">
  <div class="nav-item active" id="nav-all" onclick="filterCat('all',this)">
    <div class="nav-icon">&#9889;</div>
    <div class="nav-label">Tutto</div>
  </div>
  <div class="nav-item" id="nav-rev" onclick="filterCat('rev',this)">
    <div class="nav-icon">&#9876;&#65039;</div>
    <div class="nav-label">Rivoluz.</div>
  </div>
  <div class="nav-item" id="nav-nap" onclick="filterCat('nap',this)">
    <div class="nav-icon">&#128081;</div>
    <div class="nav-label">Napoleone</div>
  </div>
  <div class="nav-item" id="nav-key" onclick="filterCat('key',this)">
    <div class="nav-icon">&#11088;</div>
    <div class="nav-label">Date chiave</div>
  </div>
  <div class="nav-item" id="nav-int" onclick="filterCat('int',this)">
    <div class="nav-icon">&#127919;</div>
    <div class="nav-label">Interrog.</div>
  </div>
  <div class="nav-item" id="nav-saved" onclick="openSaved(this)">
    <div class="nav-icon">&#9829;</div>
    <div class="nav-label">Salvati</div>
  </div>
</div>

<div id="reel-container"></div>

<!-- Saved screen -->
<div id="saved-screen">
  <div id="saved-header">
    <div id="saved-close" onclick="closeSaved()">&#8592; Indietro</div>
    <h2>&#9825; Salvati</h2>
    <div id="saved-count">0 card salvate</div>
  </div>
  <div id="saved-list"></div>
</div>

<script>
// Load card data from JSON script tags (safe - never parsed as JS)
var CARDS = JSON.parse(document.getElementById('cards-data').textContent);
var INTERR = JSON.parse(document.getElementById('interr-data').textContent);
var KEY_RE = /1789|1791|1792|1793|1794|1795|1797|1799|1804|1805|1806|1808|1812|1813|1815/;

var currentIdx = 0;
var filtered = CARDS.slice();
var liked = {};

// ── BUILD ──
function buildSlides(cards) {
  var c = document.getElementById('reel-container');
  c.innerHTML = '';
  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    var num = (i+1 < 10 ? '0' : '') + (i+1);
    var tot = (cards.length < 10 ? '0' : '') + cards.length;

    var slide = document.createElement('div');
    slide.className = 'slide cat-' + card.cat + (i === 0 ? ' active' : '');

    var bg = document.createElement('div');
    bg.className = 'slide-bg';
    bg.style.background = 'linear-gradient(' + card.bg + ')';

    var ov = document.createElement('div');
    ov.className = 'slide-overlay';

    var sc = document.createElement('div');
    sc.className = 'slide-content';

    var tagEl = document.createElement('div');
    tagEl.className = 'slide-tag';
    tagEl.textContent = card.emoji + ' ' + card.tag;

    var numEl = document.createElement('div');
    numEl.className = 'slide-num';
    numEl.textContent = num + ' / ' + tot;

    var titleEl = document.createElement('h2');
    titleEl.className = 'slide-title';
    // Safe innerHTML: card.title only contains plain text + one em wrap
    var t = card.title;
    var em = card.title_em;
    if (em && t.indexOf(em) !== -1) {
      var before = t.substring(0, t.indexOf(em));
      var after = t.substring(t.indexOf(em) + em.length);
      var emEl = document.createElement('em');
      emEl.textContent = em;
      if (before) titleEl.appendChild(document.createTextNode(before));
      titleEl.appendChild(emEl);
      if (after) titleEl.appendChild(document.createTextNode(after));
    } else {
      titleEl.textContent = t;
    }

    var bodyEl = document.createElement('p');
    bodyEl.className = 'slide-body';
    bodyEl.innerHTML = card.body;

    var factEl = document.createElement('div');
    factEl.className = 'slide-fact';
    factEl.innerHTML = '&#128161; ' + card.fact;

    sc.appendChild(tagEl);
    sc.appendChild(numEl);
    sc.appendChild(titleEl);
    sc.appendChild(bodyEl);
    sc.appendChild(factEl);
    slide.appendChild(bg);
    slide.appendChild(ov);
    slide.appendChild(sc);
    c.appendChild(slide);
  }
  updateCounter();
  updateProgress();
  updateLikeBtn();
}

// ── SCROLL ──
function updateActive() {
  var c = document.getElementById('reel-container');
  var idx = Math.round(c.scrollTop / c.clientHeight);
  if (idx === currentIdx) return;
  currentIdx = idx;
  var slides = c.querySelectorAll('.slide');
  for (var i = 0; i < slides.length; i++) {
    slides[i].classList.toggle('active', i === idx);
  }
  updateCounter();
  updateProgress();
  updateLikeBtn();
  if (idx > 0) document.getElementById('scroll-hint').classList.add('hidden');
}

function updateCounter() {
  document.getElementById('slideCounter').textContent = (currentIdx+1) + ' / ' + filtered.length;
}

function updateProgress() {
  var pct = filtered.length > 1 ? (currentIdx / (filtered.length - 1)) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateLikeBtn() {
  var card = filtered[currentIdx];
  if (!card) return;
  var key = card.cat + '|' + card.title;
  document.getElementById('likeIcon').textContent = liked[key] ? '\u2665' : '\u2661';
  document.getElementById('btnLike').classList.toggle('liked', !!liked[key]);
}

// ── ACTIONS ──
function toggleLike() {
  var card = filtered[currentIdx];
  if (!card) return;
  var key = card.cat + '|' + card.title;
  liked[key] = !liked[key];
  updateLikeBtn();
  var icon = document.getElementById('likeIcon');
  icon.style.transform = 'scale(1.4)';
  setTimeout(function() { icon.style.transform = ''; }, 200);
}

function shuffleRandom() {
  var c = document.getElementById('reel-container');
  if (filtered.length < 2) return;
  var r;
  do { r = Math.floor(Math.random() * filtered.length); } while (r === currentIdx);
  c.scrollTo({ top: r * c.clientHeight, behavior: 'smooth' });
}

// ── FILTER ──
function filterCat(cat, el) {
  closeSaved();
  var navItems = document.querySelectorAll('.nav-item');
  for (var i = 0; i < navItems.length; i++) navItems[i].classList.remove('active');
  el.classList.add('active');

  if (cat === 'all') filtered = CARDS.slice();
  else if (cat === 'key') filtered = CARDS.filter(function(c) { return KEY_RE.test(c.tag); });
  else if (cat === 'int') filtered = INTERR.slice();
  else filtered = CARDS.filter(function(c) { return c.cat === cat; });

  currentIdx = 0;
  buildSlides(filtered);
  document.getElementById('reel-container').scrollTo({ top: 0 });
}

// ── SAVED ──
function openSaved(el) {
  var navItems = document.querySelectorAll('.nav-item');
  for (var i = 0; i < navItems.length; i++) navItems[i].classList.remove('active');
  el.classList.add('active');
  renderSaved();
  document.getElementById('saved-screen').classList.add('open');
}

function closeSaved() {
  document.getElementById('saved-screen').classList.remove('open');
}

function renderSaved() {
  var all = CARDS.concat(INTERR);
  var saved = all.filter(function(c) { return liked[c.cat + '|' + c.title]; });
  var list = document.getElementById('saved-list');
  var countEl = document.getElementById('saved-count');
  countEl.textContent = saved.length + (saved.length === 1 ? ' card salvata' : ' card salvate');
  list.innerHTML = '';

  if (saved.length === 0) {
    var empty = document.createElement('div');
    empty.id = 'saved-empty';
    var ei = document.createElement('div');
    ei.className = 'ei';
    ei.textContent = '\u2661';
    var et = document.createElement('div');
    et.textContent = 'Nessuna card salvata. Premi \u2661 su una card per salvarla qui.';
    empty.appendChild(ei);
    empty.appendChild(et);
    list.appendChild(empty);
    return;
  }

  for (var i = 0; i < saved.length; i++) {
    (function(card) {
      var key = card.cat + '|' + card.title;
      var div = document.createElement('div');
      div.className = 'saved-card';

      var tagEl = document.createElement('div');
      tagEl.className = 'saved-card-tag';
      tagEl.textContent = card.emoji + ' ' + card.tag;

      var titleEl = document.createElement('div');
      titleEl.className = 'saved-card-title';
      titleEl.textContent = card.title;

      var removeEl = document.createElement('div');
      removeEl.className = 'saved-remove';
      removeEl.textContent = '\u00d7';
      removeEl.onclick = function(e) {
        e.stopPropagation();
        liked[key] = false;
        div.style.opacity = '0';
        div.style.transform = 'translateX(20px)';
        setTimeout(renderSaved, 200);
      };

      div.appendChild(tagEl);
      div.appendChild(titleEl);
      div.appendChild(removeEl);

      div.onclick = function() {
        closeSaved();
        filtered = [card];
        currentIdx = 0;
        buildSlides(filtered);
        document.getElementById('reel-container').scrollTo({ top: 0 });
        var navItems = document.querySelectorAll('.nav-item');
        for (var j = 0; j < navItems.length; j++) navItems[j].classList.remove('active');
      };

      list.appendChild(div);
    })(saved[i]);
  }
}

// ── KEYBOARD ──
document.addEventListener('keydown', function(e) {
  var c = document.getElementById('reel-container');
  if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); c.scrollBy({ top: c.clientHeight, behavior: 'smooth' }); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); c.scrollBy({ top: -c.clientHeight, behavior: 'smooth' }); }
  else if (e.key === 'Escape') closeSaved();
});

// ── INIT ──
buildSlides(filtered);
document.getElementById('reel-container').addEventListener('scroll', updateActive, { passive: true });
