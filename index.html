<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; height:100dvh; overflow:hidden; background:#000; font-family:'Syne',sans-serif; }

#reel-container { width:100%; height:100%; height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
#reel-container::-webkit-scrollbar { display:none; }

.slide { width:100%; height:100%; height:100dvh; scroll-snap-align:start; scroll-snap-stop:always; position:relative; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; }

.slide-bg { position:absolute; inset:0; z-index:0; transition:transform .8s cubic-bezier(.2,.8,.2,1); }
.slide.active .slide-bg { transform:scale(1); }
.slide:not(.active) .slide-bg { transform:scale(1.06); }

.slide-overlay { position:absolute; inset:0; z-index:1; background:linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.45) 40%, rgba(0,0,0,.2) 70%, rgba(0,0,0,.1) 100%); }

.slide-content { position:relative; z-index:2; padding:1.8rem 1.6rem; width:100%; max-width:500px; transition:opacity .4s, transform .4s; }
.slide:not(.active) .slide-content { opacity:0; transform:translateY(16px); }
.slide.active .slide-content { opacity:1; transform:translateY(0); }

.slide-tag { display:inline-flex; align-items:center; gap:.35rem; font-size:.62rem; font-weight:700; letter-spacing:.15em; text-transform:uppercase; padding:.28rem .7rem; border-radius:2px; margin-bottom:.75rem; backdrop-filter:blur(8px); background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.7); }
.cat-rev .slide-tag { background:rgba(232,97,74,.15); border-color:rgba(232,97,74,.3); color:#e8917e; }
.cat-nap .slide-tag { background:rgba(74,143,232,.15); border-color:rgba(74,143,232,.3); color:#7eb5e8; }

.slide-num { font-family:'Syne Mono',monospace; font-size:.68rem; color:rgba(255,255,255,.28); margin-bottom:.4rem; letter-spacing:.1em; }
.slide-title { font-family:'Instrument Serif',serif; font-size:clamp(1.65rem,6vw,2.5rem); font-weight:400; line-height:1.15; color:#fff; margin-bottom:.85rem; text-shadow:0 2px 20px rgba(0,0,0,.5); }
.slide-title em { font-style:italic; color:#c9a84c; }
.slide-body { font-size:clamp(.85rem,3.5vw,.97rem); line-height:1.75; color:rgba(255,255,255,.82); margin-bottom:.9rem; }

.slide-fact { padding:.7rem .9rem; border-left:3px solid #c9a84c; background:rgba(255,255,255,.06); backdrop-filter:blur(4px); border-radius:0 4px 4px 0; font-size:clamp(.78rem,3vw,.88rem); color:rgba(255,255,255,.7); line-height:1.65; }

.app-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; color:white; letter-spacing:-.02em; }
.app-logo span { opacity:.38; }
.slide-counter { font-family:'Syne Mono',monospace; font-size:.68rem; color:rgba(255,255,255,.4); letter-spacing:.08em; }

#progress-bar { position:fixed; top:0; left:0; height:2px; background:white; z-index:100; transition:width .3s ease; mix-blend-mode:difference; }

/* SIDE ACTIONS */
#side-actions { position:fixed; right:.9rem; bottom:5rem; z-index:50; display:flex; flex-direction:column; align-items:center; gap:1.3rem; }
.action-btn { display:flex; flex-direction:column; align-items:center; gap:.25rem; cursor:pointer; }
.action-icon { width:42px; height:42px; background:rgba(255,255,255,.12); backdrop-filter:blur(10px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.05rem; border:1px solid rgba(255,255,255,.14); transition:transform .15s, background .15s; }

.action-label { font-size:.58rem; color:rgba(255,255,255,.5); font-weight:600; letter-spacing:.06em; }

/* BOTTOM NAV */
#bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; padding:.55rem 0 calc(.55rem + env(safe-area-inset-bottom, 0px)); display:flex; justify-content:space-around; background:linear-gradient(to top, rgba(0,0,0,.9), transparent); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:.2rem; cursor:pointer; padding:.25rem .5rem; opacity:.4; transition:opacity .2s; -webkit-tap-highlight-color:transparent; }
.nav-item.active { opacity:1; }
.nav-icon { font-size:1.15rem; }
.nav-label { font-size:.56rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:white; }

/* SCROLL HINT */
#scroll-hint { position:fixed; bottom:4.5rem; left:50%; transform:translateX(-50%); z-index:50; display:flex; flex-direction:column; align-items:center; gap:.3rem; transition:opacity .6s; pointer-events:none; }

.hint-txt { font-size:.58rem; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; }
</style>

var currentIdx = 0;
var filtered = CARDS.slice();
var liked = {};

var KEY_DATES = /1789|1791|1792|1793|1794|1795|1797|1799|1804|1805|1806|1808|1812|1813|1815/;

function buildSlides(cards) {
  var container = document.getElementById('reel-container');
  container.innerHTML = '';
  cards.forEach(function(card, i) {
    var slide = document.createElement('div');
    slide.className = 'slide cat-' + card.cat + (i === 0 ? ' active' : '');
    slide.setAttribute('data-idx', i);

    var titleHtml = card.title.replace(card.title_em, '<em>' + card.title_em + '</em>');
    var num = (i + 1 < 10 ? '0' : '') + (i + 1);
    var tot = (cards.length < 10 ? '0' : '') + cards.length;

    slide.innerHTML =
      '<div class="slide-bg" style="background:linear-gradient(' + card.bg + ')"></div>' +
      '<div class="slide-overlay"></div>' +
      '<div class="slide-content">' +
        '<div class="slide-tag">' + card.emoji + ' ' + card.tag + '</div>' +
        '<div class="slide-num">' + num + ' / ' + tot + '</div>' +
        '<h2 class="slide-title">' + titleHtml + '</h2>' +
        '<p class="slide-body">' + card.body + '</p>' +
        '<div class="slide-fact">&#x1F4A1; ' + card.fact + '</div>' +
      '</div>';

    container.appendChild(slide);
  });
  updateCounter();
  updateProgress();
  updateLikeBtn();
}

function updateActive() {
  var container = document.getElementById('reel-container');
  var h = container.clientHeight;
  var idx = Math.round(container.scrollTop / h);
  if (idx === currentIdx) return;
  currentIdx = idx;
  var slides = document.querySelectorAll('.slide');
  slides.forEach(function(s, i) { s.classList.toggle('active', i === idx); });
  updateCounter();
  updateProgress();
  updateLikeBtn();
  if (idx > 0) document.getElementById('scroll-hint').classList.add('hidden');
}

function updateCounter() {
  document.getElementById('slideCounter').textContent = (currentIdx + 1) + ' / ' + filtered.length;
}

function updateProgress() {
  var pct = filtered.length > 1 ? (currentIdx / (filtered.length - 1)) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function updateLikeBtn() {
  var card = filtered[currentIdx];
  if (!card) return;
  var key = card.cat + card.title;
  var btn = document.getElementById('btnLike');
  btn.querySelector('.action-icon').innerHTML = liked[key] ? '&#9829;' : '&#9825;';
  btn.classList.toggle('liked', !!liked[key]);
}

function toggleLike() {
  var card = filtered[currentIdx];
  if (!card) return;
  var key = card.cat + card.title;
  liked[key] = !liked[key];
  updateLikeBtn();
  var icon = document.querySelector('#btnLike .action-icon');
  icon.style.transform = 'scale(1.4)';
  setTimeout(function() { icon.style.transform = ''; }, 200);
}

function shuffleToRandom() {
  var container = document.getElementById('reel-container');
  var total = filtered.length;
  if (total < 2) return;
  var rand;
  do { rand = Math.floor(Math.random() * total); } while (rand === currentIdx);
  container.scrollTo({ top: rand * container.clientHeight, behavior: 'smooth' });
}

function filterCat(cat, el) {
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  el.classList.add('active');
  if (cat === 'key') {
    filtered = CARDS.filter(function(c) { return KEY_DATES.test(c.tag); });
  } else if (cat === 'all') {
    filtered = CARDS.slice();
  } else {
    filtered = CARDS.filter(function(c) { return c.cat === cat; });
  }
  currentIdx = 0;
  buildSlides(filtered);
  document.getElementById('reel-container').scrollTo({ top: 0 });
}

document.addEventListener('keydown', function(e) {
  var container = document.getElementById('reel-container');
  var h = container.clientHeight;
  if (e.key === 'ArrowDown' || e.key === 'j' || e.key === ' ') {
    e.preventDefault();
    container.scrollBy({ top: h, behavior: 'smooth' });
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    container.scrollBy({ top: -h, behavior: 'smooth' });
  }
});

buildSlides(filtered);
document.getElementById('reel-container').addEventListener('scroll', updateActive, { passive: true });
</script>
